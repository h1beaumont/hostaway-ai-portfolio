function useCounter(target, duration = 2000, start = false) {
  const [count, setCount] = useState(0);
  useEffect(() => {
    if (!start) return;
    let startTime = null;
    const step = (ts) => {
      if (!startTime) startTime = ts;
      const p = Math.min((ts - startTime) / duration, 1);
      setCount(Math.floor(p * target));
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [target, duration, start]);
  return count;
}

function Reveal({ children, delay = 0 }) {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setV(true); obs.disconnect(); } }, { threshold: 0.1 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return <div ref={ref} style={{ opacity: v ? 1 : 0, transform: v ? "translateY(0)" : "translateY(20px)", transition: `all 0.6s ease ${delay}s` }}>{children}</div>;
}

  const [loaded, setLoaded] = useState(false);
  const [statsInView, setStatsInView] = useState(false);
  const [activeNav, setActiveNav] = useState("");
  const statsRef = useRef(null);

  useEffect(() => { setTimeout(() => setLoaded(true), 100); }, []);

  useEffect(() => {
    const el = statsRef.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setStatsInView(true); obs.disconnect(); } }, { threshold: 0.3 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);

  useEffect(() => {
    const els = NAV_SECTIONS.map(s => document.getElementById(s.id)).filter(Boolean);
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) setActiveNav(e.target.id); });
    }, { threshold: 0.2, rootMargin: "-60px 0px -60% 0px" });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);

  const scrollTo = (id) => {
    document.getElementById(id)?.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  const sf = "system-ui, -apple-system, sans-serif";

  return (
    <div style={{ minHeight: "100vh", background: "#FAFAF8", fontFamily: "'Georgia', 'Times New Roman', serif", color: "#1a1a1a" }}>

      {/* Sticky Nav */}
      <nav style={{
        position: "sticky", top: 0, zIndex: 100,
        background: "rgba(250,250,248,0.92)", backdropFilter: "blur(12px)", WebkitBackdropFilter: "blur(12px)",
        borderBottom: "1px solid #e8e5e0",
        padding: "0 24px",
        opacity: loaded ? 1 : 0, transition: "opacity 0.4s ease 0.3s",
      }}>
        <div style={{ maxWidth: 800, margin: "0 auto", display: "flex", gap: 0, overflowX: "auto", scrollbarWidth: "none" }}>
          {NAV_SECTIONS.map(s => (
            <button
              key={s.id}
              onClick={() => scrollTo(s.id)}
              style={{
                background: "none", border: "none", cursor: "pointer",
                padding: "14px 14px 12px",
                fontSize: 11, fontFamily: sf, letterSpacing: "1px", textTransform: "uppercase",
                color: activeNav === s.id ? ACCENT : "#a09a92",
                borderBottom: activeNav === s.id ? `2px solid ${ACCENT}` : "2px solid transparent",
                transition: "all 0.2s", whiteSpace: "nowrap",
                fontWeight: activeNav === s.id ? 600 : 400,
              }}
            >
              {s.label}
            </button>
          ))}
        </div>
      </nav>

      {/* Application badge */}
      <div style={{
        background: ACCENT_LIGHT, borderBottom: `1px solid ${ACCENT}22`,
        padding: "10px 24px", textAlign: "center",
        opacity: loaded ? 1 : 0, transition: "opacity 0.4s ease 0.2s",
      }}>
        <span style={{ fontSize: 12, fontFamily: sf, color: ACCENT, letterSpacing: "1px", fontWeight: 500 }}>
          APPLICATION · INTERNAL AI TOOLS SPECIALIST (EMEA) · HOSTAWAY
        </span>
      </div>

      {/* Header */}
      <div style={{
        padding: "48px 0 40px", textAlign: "center",
        opacity: loaded ? 1 : 0, transform: loaded ? "translateY(0)" : "translateY(-10px)", transition: "all 0.6s ease",
      }}>
        <h1 style={{ fontSize: "clamp(28px, 4vw, 42px)", fontWeight: 400, letterSpacing: "-0.5px", margin: "0 0 8px" }}>
          Harry Beaumont
        </h1>
        <p style={{ fontSize: "clamp(14px, 2vw, 17px)", color: "#6b6560", margin: "0 0 20px", fontStyle: "italic", letterSpacing: "0.3px" }}>
          Internal AI Tools Builder · Hostaway API Integrator · Production AI Systems
        </p>
        <div style={{ display: "flex", gap: 24, justifyContent: "center", flexWrap: "wrap", fontSize: 14, padding: "0 20px" }}>
          <a href="https://github.com/h1beaumont" target="_blank" rel="noopener noreferrer" style={{ color: ACCENT, textDecoration: "none", borderBottom: `1px solid ${ACCENT}44`, paddingBottom: 2 }}>github.com/h1beaumont</a>
          <a href="https://ops.keystays.uk" target="_blank" rel="noopener noreferrer" style={{ color: ACCENT, textDecoration: "none", borderBottom: `1px solid ${ACCENT}44`, paddingBottom: 2 }}>ops.keystays.uk ↗</a>
          <a href="https://keystays.co.uk" target="_blank" rel="noopener noreferrer" style={{ color: ACCENT, textDecoration: "none", borderBottom: `1px solid ${ACCENT}44`, paddingBottom: 2 }}>keystays.co.uk ↗</a>
          <a href="https://midlandsdigital.ai" target="_blank" rel="noopener noreferrer" style={{ color: ACCENT, textDecoration: "none", borderBottom: `1px solid ${ACCENT}44`, paddingBottom: 2 }}>midlandsdigital.ai ↗</a>
          <span style={{ color: "#a09a92" }}>Nottingham, UK · Remote</span>
        </div>
      </div>

      {/* Intro */}
      <div style={{ maxWidth: 720, margin: "0 auto", padding: "0 24px", opacity: loaded ? 1 : 0, transition: "opacity 0.6s ease 0.2s" }}>
        <p style={{ fontSize: "clamp(15px, 2vw, 17px)", lineHeight: 1.75, color: "#3d3832", margin: 0 }}>
          For the past three years I've been a Hostaway power user and API integrator — managing 68 live properties
          through the platform while building a stack of internal AI tools on top of it. My dynamic pricing engine
          calls the Hostaway API every day to push rates across all 68 listings. My Communications Agent pulls
          real-time reservation context from Hostaway to draft guest responses. My Onboarding Agent pushes new
          properties into Hostaway as part of an 11-stage automated pipeline. I know this platform from the operator
          side in depth — and I've spent seven years building the exact thing this role requires: internal AI tools
          that make operations faster, smarter, and more reliable.
        </p>
      </div>

      {/* Stats */}
      <div ref={statsRef} style={{ maxWidth: 800, margin: "40px auto 0", padding: "0 24px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 8, padding: "28px 0", borderTop: "1px solid #e8e5e0", borderBottom: "1px solid #e8e5e0" }}>
          {STATS.map((s, i) => <StatCard key={i} stat={s} index={i} inView={statsInView} />)}
        </div>
      </div>

      <div style={{ maxWidth: 800, margin: "0 auto", padding: "48px 24px 0" }}>

        {/* Timeline */}
        <Reveal>
          <SectionHeading id="timeline">Timeline</SectionHeading>
        </Reveal>
        <div style={{ position: "relative", paddingLeft: 28, marginBottom: 56 }}>
          <div style={{ position: "absolute", left: 6, top: 4, bottom: 4, width: 1, background: "#ddd8d0" }} />
          {TIMELINE.map((item, idx) => (
            <Reveal key={idx} delay={idx * 0.06}>
              <div style={{ position: "relative", marginBottom: idx === TIMELINE.length - 1 ? 0 : 28 }}>
                <div style={{ position: "absolute", left: -28, top: 5, width: 13, height: 13, borderRadius: "50%", background: item.type === "hostaway" ? ACCENT : item.type === "founded" ? "#8b7355" : "#FAFAF8", border: item.type === "hostaway" ? `2px solid ${ACCENT}` : item.type === "founded" ? "2px solid #8b7355" : "2px solid #b5ad9e" }} />
                <div style={{ fontSize: 12, fontFamily: sf, color: item.type === "hostaway" ? ACCENT : "#8b7355", letterSpacing: "1px", marginBottom: 4, fontWeight: 600 }}>{item.year}</div>
                <div style={{ fontSize: "clamp(15px, 2vw, 17px)", fontWeight: 400, color: "#1a1a1a", marginBottom: 4 }}>{item.title}</div>
                <div style={{ fontSize: "clamp(13px, 1.8vw, 14.5px)", lineHeight: 1.65, color: "#5a5550" }}>{item.detail}</div>
              </div>
            </Reveal>
          ))}
        </div>

        {/* Architecture */}
        <Reveal>
          <SectionHeading id="architecture">Internal AI System Architecture</SectionHeading>
        </Reveal>
        <Reveal delay={0.1}>
          <div style={{ padding: "24px 16px", background: "#FEFDFB", border: "1px solid #ece9e3", borderRadius: 8, marginBottom: 56 }}>
            <ArchitectureDiagram />
            <p style={{ fontSize: 12, fontFamily: sf, color: "#9b9389", textAlign: "center", margin: "12px 0 0", fontStyle: "italic" }}>
              5 autonomous agents communicating via inter-agent bus — Hostaway API is the central data source, called daily by the pricing engine and in real-time by the comms agent
            </p>
          </div>
        </Reveal>

        {/* Agents */}
        <Reveal>
          <SectionHeading id="agents">The 5-Agent Internal AI Stack</SectionHeading>
        </Reveal>
        <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 56 }}>
          {AGENTS.map((a, i) => (
            <Reveal key={i} delay={i * 0.06}>
              <ExpandableCard item={a} accentColor={ACCENT} />
            </Reveal>
          ))}
        </div>

        {/* Tools */}
        <Reveal>
          <SectionHeading id="tools">Internal Tools Built</SectionHeading>
        </Reveal>
        <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 56 }}>
          {TOOLS.map((t, i) => (
            <Reveal key={i} delay={i * 0.06}>
              <ExpandableCard item={t} accentColor={ACCENT} />
            </Reveal>
          ))}
        </div>

        {/* Hostaway Section */}
        <Reveal>
          <SectionHeading id="hostaway" accent={true}>Hostaway — What I Know From the Inside</SectionHeading>
        </Reveal>
        <Reveal delay={0.05}>
          <div style={{ padding: "20px 24px", background: ACCENT_LIGHT, border: `1px solid ${ACCENT}22`, borderRadius: 8, marginBottom: 20, display: "flex", alignItems: "flex-start", gap: 16 }}>
            <div style={{ fontSize: 28, flexShrink: 0, marginTop: 2 }}>🏠</div>
            <div>
              <div style={{ fontSize: 15, fontWeight: 500, color: ACCENT, marginBottom: 4, fontFamily: sf }}>Currently managing 68 live properties via Hostaway</div>
              <p style={{ fontSize: 13.5, lineHeight: 1.65, color: "#4a4560", margin: 0, fontFamily: sf }}>
                I'm not a candidate who has heard of Hostaway. I'm an active operator using the platform daily — bookings, messaging, owner payouts, rate management. I know where the product works brilliantly and I know where operators hit friction. That operator-side context is directly useful when building internal AI tools for Hostaway teams.
              </p>
            </div>
          </div>
        </Reveal>
        <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 56 }}>
          {HOSTAWAY_DEPTH.map((item, i) => (
            <Reveal key={i} delay={i * 0.06}>
              <ExpandableCard item={item} accentColor={ACCENT} />
            </Reveal>
          ))}
        </div>

        {/* Integration Ecosystem */}
        <Reveal>
          <div style={{ marginBottom: 32 }}>
            <div style={{ fontSize: 12, fontFamily: sf, textTransform: "uppercase", letterSpacing: "1.5px", color: "#b5ad9e", marginBottom: 12, fontWeight: 500 }}>Integration Ecosystem</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {INTEGRATIONS.map((int, i) => {
                const c = INTEGRATION_COLORS[int.category];
                return (
                  <span key={i} style={{
                    fontSize: 13, fontFamily: sf, fontWeight: int.category === "core" ? 600 : 500,
                    padding: "7px 16px", borderRadius: 20,
                    background: c.bg, color: c.color,
                    border: `1px solid ${c.color}22`,
                    letterSpacing: "0.2px",
                  }}>
                    {int.name}
                  </span>
                );
              })}
            </div>
          </div>
        </Reveal>

        {/* AI Practice */}
        <Reveal>
          <SectionHeading id="ai-practice">AI Practice & Methodology</SectionHeading>
        </Reveal>
        <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 56 }}>
          {AI_PRACTICE.map((item, idx) => (
            <Reveal key={idx} delay={idx * 0.06}>
              <ExpandableCard item={item} accentColor={ACCENT} />
            </Reveal>
          ))}
        </div>

        {/* Lessons */}
        <Reveal>
          <SectionHeading id="lessons">Lessons from Shipping AI in Production</SectionHeading>
        </Reveal>
        <Reveal delay={0.1}>
          <div style={{ padding: "32px", background: "#FEFDFB", border: "1px solid #ece9e3", borderRadius: 8, marginBottom: 56 }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
              {LESSONS.map((lesson, i) => (
                <div key={i} style={{ paddingLeft: 16, borderLeft: `2px solid ${i === 0 ? ACCENT : "#e8e5e0"}` }}>
                  <div style={{ fontSize: "clamp(14px, 2vw, 16px)", fontWeight: 500, color: "#1a1a1a", marginBottom: 4 }}>{lesson.title}</div>
                  <p style={{ fontSize: "clamp(12px, 1.6vw, 14px)", lineHeight: 1.65, color: "#5a5550", margin: 0 }}>{lesson.detail}</p>
                </div>
              ))}
            </div>
          </div>
        </Reveal>

        {/* Why Hostaway */}
        <Reveal>
          <SectionHeading id="why-hostaway" accent={true}>Why Hostaway — Why This Role</SectionHeading>
        </Reveal>
        <Reveal delay={0.1}>
          <div style={{ padding: "36px", background: "#FEFDFB", border: `1px solid ${ACCENT}22`, borderRadius: 8, marginBottom: 56 }}>
            <p style={{ fontSize: "clamp(15px, 2vw, 17px)", lineHeight: 1.8, color: "#3d3832", margin: "0 0 20px" }}>
              I didn't find this role through a job board and think "that sounds interesting." I've been a Hostaway customer for years. I've built my entire operational stack on top of your API. I call your endpoints every morning at 6am. When I saw the Internal AI Tools Specialist role, the alignment was immediate — I've been doing a version of this job for myself.
            </p>
            <p style={{ fontSize: "clamp(15px, 2vw, 17px)", lineHeight: 1.8, color: "#3d3832", margin: "0 0 20px" }}>
              Building internal AI tools for a company means understanding both the technical surface area (what's possible with the APIs, data, and AI models) and the operational reality (what the teams actually need, where manual workflows are creating friction, which decisions are worth automating). I have both. I've been the operator and the builder simultaneously.
            </p>
            <p style={{ fontSize: "clamp(15px, 2vw, 17px)", lineHeight: 1.8, color: "#3d3832", margin: "0 0 20px" }}>
              Hostaway is building tools for operators like me — and now I want to help build the tools your team uses internally. That's a full-circle application I can make with genuine conviction.
            </p>
            <div style={{ padding: "20px 24px", background: ACCENT_LIGHT, borderRadius: 6, marginTop: 8 }}>
              <p style={{ fontSize: 14, lineHeight: 1.7, color: ACCENT, margin: 0, fontFamily: sf, fontWeight: 500 }}>
                Based in Nottingham, UK · Available immediately · Happy to talk — harrybeaumont0@gmail.com
              </p>
            </div>
          </div>
        </Reveal>
      </div>

      {/* Footer */}
      <div style={{ maxWidth: 800, margin: "0 auto", padding: "0 24px 80px" }}>
        <Reveal>
          <div style={{ textAlign: "center", padding: "40px 0 0", borderTop: "1px solid #e8e5e0" }}>
            <p style={{ fontSize: 14, color: "#9b9389", fontStyle: "italic", margin: "0 0 12px", lineHeight: 1.6 }}>
              Applying for: Internal AI Tools Specialist (EMEA) · Hostaway · Remote · March 2026
            </p>
            <p style={{ fontSize: 12, color: "#b5ad9e", margin: 0 }}>
              harrybeaumont0@gmail.com · <a href="https://github.com/h1beaumont" target="_blank" rel="noopener noreferrer" style={{ color: "#b5ad9e", textDecoration: "none" }}>github.com/h1beaumont</a>
            </p>
          </div>
        </Reveal>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Portfolio />);
</script>
</body>
</html>
